<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey Honey</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fefcf5;
      --ink: #2c1f14;
      --blush: #c9826b;
      --gold: #b8935a;
      --honey: #e8a830;
      --muted: #8a7060;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(232,168,48,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(201,130,107,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: #fff;
      border: 1px solid rgba(232,168,48,0.2);
      padding: 3.5rem 3rem 3rem;
      box-shadow:
        0 2px 4px rgba(44,31,20,0.04),
        0 12px 40px rgba(44,31,20,0.08),
        0 0 0 6px var(--cream),
        0 0 0 7px rgba(232,168,48,0.15);
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    .icon {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards;
    }

    @keyframes bounce {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    .label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--honey);
      text-align: center;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fade 0.8s ease 1.1s forwards;
    }

    .message {
      font-size: 1.25rem;
      font-weight: 300;
      line-height: 1.9;
      color: var(--ink);
      text-align: center;
      opacity: 0;
      animation: fade 0.9s ease 1.3s forwards;
    }

    .message em { font-style: italic; color: var(--blush); }
    .message strong { font-weight: 400; color: var(--honey); }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--honey), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fade 0.8s ease 1.5s forwards;
    }

    .signature {
      font-size: 1.5rem;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fade 0.8s ease 1.7s forwards;
    }

    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐦</div>

    <div class="label">a little reminder</div>

    <p class="message">
      Hey Honey.<br><br>
      I just want you to know<br>
      that somewhere on the other side of the world,<br>
      a man is <em>absolutely convinced</em><br>
      he married the best person.<br><br>
      Like, <strong>embarrassingly sure.</strong><br><br>
      You make my life better<br>
      just by existing in it.<br><br>
      That's all. Carry on. 🐝
    </p>

    <div class="divider"></div>

    <div class="signature">missing you, Honey</div>
  </div>
</body>
</html>
