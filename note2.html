<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Morning, Hummingbird</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf6f0;
      --ink: #2c1f14;
      --blush: #c9826b;
      --gold: #b8935a;
      --muted: #8a7060;
      --sky: #d6e8f0;
    }

    body {
      background: linear-gradient(160deg, #fef9f4 0%, #f5e8dc 50%, #faf6f0 100%);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 0%, rgba(255,220,180,0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(201,130,107,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(184,147,90,0.18);
      padding: 3.5rem 3rem 3rem;
      box-shadow:
        0 2px 4px rgba(44,31,20,0.04),
        0 12px 40px rgba(44,31,20,0.08),
        0 0 0 6px rgba(255,255,255,0.6),
        0 0 0 7px rgba(184,147,90,0.12);
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .sun {
      text-align: center;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fade 0.8s ease 0.9s forwards;
    }

    .sun svg { width: 52px; height: 52px; }

    .label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fade 0.8s ease 1.1s forwards;
    }

    .message {
      font-size: 1.25rem;
      font-weight: 300;
      line-height: 1.9;
      color: var(--ink);
      text-align: center;
      opacity: 0;
      animation: fade 0.9s ease 1.3s forwards;
    }

    .message em { font-style: italic; color: var(--blush); }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fade 0.8s ease 1.5s forwards;
    }

    .signature {
      font-size: 1.5rem;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fade 0.8s ease 1.7s forwards;
    }

    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="sun">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="10" fill="#f0c97a" opacity="0.85"/>
        <circle cx="26" cy="26" r="7" fill="#e8b84b" opacity="0.9"/>
        <!-- rays -->
        <line x1="26" y1="4" x2="26" y2="10" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="26" y1="42" x2="26" y2="48" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4" y1="26" x2="10" y2="26" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="42" y1="26" x2="48" y2="26" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9.5" y1="9.5" x2="13.7" y2="13.7" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="38.3" y1="38.3" x2="42.5" y2="42.5" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="42.5" y1="9.5" x2="38.3" y2="13.7" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="13.7" y1="38.3" x2="9.5" y2="42.5" stroke="#e8b84b" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="label">good morning, hummingbird</div>

    <p class="message">
      Whatever time it is where you are,<br>
      whatever the sky looks like outside your window —<br>
      <em>my first thought today was you.</em><br><br>
      The distance is real.<br>
      The waiting is real.<br>
      But so is Belgrade.<br>
      So is us.<br><br>
      Start your day knowing<br>
      you are so deeply loved.
    </p>

    <div class="divider"></div>

    <div class="signature">good morning, Yuanyuan 🌤</div>
  </div>
</body>
</html>
